<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Names Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="wheel-area">
            <div class="arrow"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <button id="spinBtn">SPIN</button>
        </div>
        
        <div class="sidebar">
            <h2>Names List</h2>
            <textarea id="nameInput" spellcheck="false">GOLD
DIAMOND
RAINBOW
Player 1
Player 2
Player 3</textarea>
            <p class="hint">One name per line</p>
        </div>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-box">
            <h2>Winner!</h2>
            <div id="winnerDisplay"></div>
            <button onclick="document.getElementById('winModal').style.display='none'">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
